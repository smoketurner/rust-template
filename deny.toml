# cargo-deny configuration. Run with `cargo deny check`.
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true
targets = [
    "aarch64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
]

[advisories]
# Fail on any security advisory. Add specific RUSTSEC IDs here only with a
# justification comment when an advisory truly does not apply.
ignore = []

[licenses]
confidence-threshold = 0.9
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
exceptions = []

[bans]
multiple-versions   = "warn"
wildcards           = "deny"
allow-wildcard-paths = true
# Keep the alternative TLS/crypto stacks out of the tree. aws-lc-rs is the
# single crypto provider for this template (see docs/crypto.md).
deny = [
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "native-tls" },
    { name = "ring" },
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
